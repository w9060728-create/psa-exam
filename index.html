<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGBOX 專業技術評核系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .opt-btn { transition: all 0.2s ease; border: 2px solid #e2e8f0; }
        
        /* 答題即時反饋樣式 */
        .opt-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: 700; }
        .opt-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .opt-highlight { border-color: #22c55e !important; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2) !important; }
        
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 成功提交時的紙花特效 -->
    <canvas id="confetti-canvas"></canvas>

    <div id="app" class="w-full max-w-lg relative">
        
        <!-- 登入畫面 -->
        <div id="login-screen" class="glass-card rounded-3xl shadow-2xl p-8 border border-slate-200">
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-blue-600 rounded-2xl mb-4 shadow-lg rotate-3">
                    <span class="text-white font-black text-2xl">DBX</span>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">技術部專業評核</h1>
                <p class="text-slate-500 text-sm mt-2">請輸入您的單位資訊以進行測驗</p>
            </div>
            
            <div class="space-y-5">
                <!-- 經銷商欄位 -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1 ml-1 uppercase tracking-widest">經銷商名稱</label>
                    <input type="text" id="user-dealer" placeholder="例如：台北濱江 / 彰化金馬" 
                           class="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-blue-500 outline-none text-lg font-medium transition-all">
                </div>
                <!-- 姓名欄位 -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1 ml-1 uppercase tracking-widest">技師姓名</label>
                    <input type="text" id="user-name" placeholder="請輸入姓名全名" 
                           class="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-blue-500 outline-none text-lg font-medium transition-all">
                </div>
            </div>
            
            <button onclick="startApp()" class="w-full mt-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95">
                開始進入評核
            </button>
            <p class="text-center text-xs text-slate-400 mt-4">⚠️ 測驗限時 30 分鐘，中途離開將視為 0 分</p>
        </div>

        <!-- 測驗內容區 -->
        <div id="quiz-screen" class="hidden glass-card rounded-3xl shadow-2xl overflow-hidden border border-slate-200 animate-fade">
            <!-- 進度條 -->
            <div class="h-2 w-full bg-slate-100">
                <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
            </div>
            
            <div class="p-8">
                <!-- 頂部資訊列 (計時器與姓名) -->
                <div class="flex justify-between items-center mb-6">
                    <span id="q-count" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full"></span>
                    <span id="name-tag" class="text-[10px] text-slate-400 font-bold uppercase max-w-[120px] truncate"></span>
                </div>
                
                <!-- 計時器顯示 -->
                <div id="timer-display" class="mb-6 py-2 px-4 bg-slate-100 rounded-xl text-center font-mono text-xl font-bold text-slate-700 border-2 border-slate-200 transition-colors">
                    ⏱️ 30:00
                </div>

                <!-- 題目文字 -->
                <h2 id="q-text" class="text-lg font-bold text-slate-800 mb-8 leading-relaxed"></h2>
                
                <!-- 選項區塊 -->
                <div id="options-box" class="space-y-3"></div>
                
                <!-- 即時回饋提示框 -->
                <div id="feedback-hint" class="mt-6 hidden animate-fade">
                    <div id="hint-box" class="p-4 rounded-xl text-sm font-bold flex items-center gap-2"></div>
                </div>
                
                <!-- 下一題按鈕 -->
                <button id="next-btn" onclick="goToNext()" disabled 
                        class="mt-10 w-full py-4 bg-slate-200 text-slate-400 font-bold rounded-xl cursor-not-allowed transition-all">
                    請選取答案
                </button>
            </div>
        </div>

        <!-- 結果與提交 -->
        <div id="result-screen" class="hidden glass-card rounded-3xl shadow-2xl p-10 text-center border border-slate-200 animate-fade">
            <div id="loading-state" class="py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto"></div>
                <p class="mt-4 text-slate-500 font-medium">數據加密同步至後台...</p>
            </div>
            
            <div id="score-display" class="hidden">
                <div class="mb-4 inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full text-green-600 font-bold text-2xl">✓</div>
                <h2 class="text-xl font-bold text-slate-800 mb-2" id="result-title">評核完成</h2>
                <p id="timeout-msg" class="text-red-500 text-sm font-bold mb-2 hidden">⚠️ 時間到，已自動強制交卷</p>
                <div class="text-7xl font-black text-blue-600 italic mb-8" id="final-score">0</div>
                
                <div class="bg-slate-50 rounded-2xl p-5 mb-8 text-left border border-slate-100">
                    <div class="flex justify-between items-center mb-3 border-b border-slate-200 pb-2">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">應試者雲端報告</span>
                        <span class="text-[10px] bg-green-500 text-white px-2 py-0.5 rounded">已存檔</span>
                    </div>
                    <div class="space-y-2 text-sm text-slate-600 pt-2 font-medium">
                        <p>單位：<span id="summary-dealer" class="text-slate-900"></span></p>
                        <p>姓名：<span id="summary-name" class="text-slate-900"></span></p>
                        <p>得分：<span id="summary-score" class="text-blue-600 font-bold text-lg"></span></p>
                        <p class="text-xs text-slate-400 mt-2">答題詳情已隱藏並傳送至管理後台</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Google Forms 提交參數配置 (已更新為最新網址的 ID)
        const CONFIG = {
            formID: "1FAIpQLSftyWqZ8Q8tkYGA6bQeSnP2nxZldQoPt2gH7mSXczpfnNloaA",
            dealerEntry: "entry.1741632433",
            nameEntry: "entry.1735160920",
            scoreEntry: "entry.609819735",
            detailEntry: "entry.1154807191"
        };

        const quizData = [
            { q: "Stellantis 提供哪種方案包含加固電腦、PSA XS E 診斷接頭且有四年保固？", a: ["DIAGBOX One", "DIAGBOX Liberty", "DIAGBOX Premium", "DIAGBOX Token"], c: 2 },
            { q: "獨立維修廠 (Independent repairers) 的授權運作方式為何？", a: ["永久免費授權", "每月固定月費制", "購買代幣，每品牌有效期限為一週", "購買代幣，每品牌有效期限為一年"], c: 2 },
            { q: "哪個品牌特別標註僅適用於「2018 年以後上市」的車型？", a: ["Citroën", "Peugeot", "DS Automobiles", "Opel / Vauxhall"], c: 3 },
            { q: "在入口網站若要隱藏不常出現的車型以節省搜尋時間，應點擊？", a: ["Configuration du portail", "Menu Diagnostic", "Gestion Flash", "Aide"], c: 0 },
            { q: "若要顯示所有「被隱藏」的車型，應點擊入口網站的哪個按鈕？", a: ["Refresh", "Help", "...", "Home"], c: 2 },
            { q: "執行新車準備 (PVN) 或加裝附件 (如倒車顯影)，應選擇哪個選單？", a: ["Repair", "Fault finding", "Customer delivery", "Servicing"], c: 2 },
            { q: "在「Repair」選單中，若 ECU 未被自動識別，畫面上會顯示？", a: ["calculateur inconnu", "Connection Error", "Code 404", "System Busy"], c: 0 },
            { q: "關於「手動配置」，下列敘述何者正確？", a: ["可直接進入", "僅限離線使用", "自動配置執行過後才能存取", "僅適用於舊款車型"], c: 2 },
            { q: "在 Download 選單中若顯示「ECU updated」，代表什麼？", a: ["ECU 損壞", "電池電壓不足", "ECU 版本比伺服器上的更新", "網路中斷"], c: 2 },
            { q: "更換零件 (如 ECU) 時，應優先使用哪一個子選單？", a: ["Identification", "Fault Reading", "Repair pack", "Actuator Test"], c: 2 },
            { q: "Fault finding 開始前，驗證圖示 (Authentication icon) 應為何種顏色？", a: ["紅色", "黃色", "藍色", "綠色"], c: 3 },
            { q: "下列哪項操作屬於「Servicing (保養)」選單的操作範疇？", a: ["加裝警報器", "添加柴油添加劑 (DPF)", "更改輪胎規格", "新車交車檢查"], c: 1 },
            { q: "2015 年以後新發佈的 TSB (技術通報) 應在哪裡搜尋？", a: ["DIAGBOX 內建標籤", "實體紙本手冊", "Service Box 網頁", "手機簡訊通報"], c: 2 },
            { q: "關於 TSB 的使用規範，下列敘述何者「錯誤」？", a: ["查閱 TSB 是強制性步驟", "禁止列印 TSB 文件", "可將 TSB 用於不同車身號碼之車輛", "禁止外流資訊"], c: 2 },
            { q: "建立 DID-A 之前，技師「必須」先執行？", a: ["重灌 DIAGBOX", "查閱 ISolve 確認有無方案", "更換 VCI 接頭", "直接致電技術部"], c: 1 },
            { q: "準備 DID-A 時，關於診斷畫面截圖的正確做法是？", a: ["用手機拍照", "用數位相機拍照", "使用 DIAGBOX 內建截圖功能", "不需提供畫面"], c: 2 },
            { q: "針對「同一個」未解決的問題，應如何發送 DID-A 以獲得優先處理？", a: ["建立大量新檔案", "開啟「補充 (Supplement)」案件", "改寄電子郵件", "透過傳真申請"], c: 1 },
            { q: "若遇到「診斷工具啟用/註冊」問題，求助管道為何？", a: ["DIAGBOX 內的 Report 標籤", "透過 Service Box 請求協助", "ISolve 系統", "重新開機即可"], c: 1 },
            { q: "為維持工具最佳效能，技師在「每天結束工作時」應？", a: ["保持待機", "關閉電腦電源", "持續充電", "保持螢幕常亮"], c: 1 },
            { q: "診斷電腦對於「第三方軟體」的安裝規範為何？", a: ["可以自由安裝", "僅能安裝 Stellantis 核准的軟體", "只要不影響效能即可安裝", "無任何限制"], c: 1 }
        ];

        let state = {
            index: 0,
            score: 0,
            userName: "",
            userDealer: "",
            isAnswering: true,
            userRecords: [],
            timeLeft: 1800, // 30分鐘 = 1800秒
            timerInterval: null
        };

        // 防作弊機制：關閉網頁攔截
        window.addEventListener('beforeunload', function (e) {
            if (state.userName !== "" && state.index < quizData.length && state.timerInterval !== null) {
                e.preventDefault();
                e.returnValue = '測驗尚未完成，現在離開將不會儲存您的進度！';
            }
        });

        // 登入並開始測驗
        function startApp() {
            const dealer = document.getElementById('user-dealer').value.trim();
            const name = document.getElementById('user-name').value.trim();
            if (!dealer || !name) return alert("請輸入經銷商名稱與技師姓名以開始測驗");
            
            state.userDealer = dealer;
            state.userName = name;
            
            // 防作弊：登入時先向 Google 表單發送一筆「中途退出/未交卷」的紀錄
            sendAntiCheatRecord();

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('name-tag').innerText = `${dealer} / ${name}`;
            
            startTimer();
            renderQuestion();
        }

        // 發送初始的警告紀錄 (若中途關閉視窗，後台會留存此紀錄)
        function sendAntiCheatRecord() {
            const postUrl = `https://docs.google.com/forms/d/e/${CONFIG.formID}/formResponse`;
            const params = new URLSearchParams();
            params.append(CONFIG.dealerEntry, state.userDealer);
            params.append(CONFIG.nameEntry, state.userName);
            params.append(CONFIG.scoreEntry, "0"); // 暫記 0 分
            params.append(CONFIG.detailEntry, "【警告】該技師已進入測驗，但中途關閉網頁未交卷或逾時作廢。");

            fetch(postUrl, { method: 'POST', mode: 'no-cors', body: params.toString() });
        }

        // 計時器邏輯
        function startTimer() {
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();

                if (state.timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    autoSubmitTimeout();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerDiv = document.getElementById('timer-display');
            const minutes = Math.floor(state.timeLeft / 60);
            const seconds = state.timeLeft % 60;
            const timeString = `⏱️ ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            timerDiv.innerText = timeString;

            // 剩下 5 分鐘以內 (300秒) 變為紅色警告閃爍
            if (state.timeLeft <= 300 && state.timeLeft > 0) {
                timerDiv.classList.add('bg-red-100', 'text-red-600', 'border-red-300', 'animate-pulse');
                timerDiv.classList.remove('bg-slate-100', 'text-slate-700', 'border-slate-200');
            }
        }

        // 時間到強制交卷邏輯
        function autoSubmitTimeout() {
            state.isAnswering = false; // 停止答題
            
            // 把尚未作答的題目全部標記為 [未答]
            for (let i = state.index; i < quizData.length; i++) {
                const q = quizData[i];
                state.userRecords.push(`Q${i + 1}:[未答] 技師選:未答 / 正確解:${q.a[q.c]}`);
            }

            // 標示 UI 顯示逾時訊息
            document.getElementById('timeout-msg').classList.remove('hidden');
            document.getElementById('result-title').innerText = "測驗已強制結束";
            
            finalize();
        }

        function renderQuestion() {
            state.isAnswering = true;
            const q = quizData[state.index];
            document.getElementById('q-count').innerText = `題目 ${state.index + 1} / ${quizData.length}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('progress-bar').style.width = `${((state.index) / quizData.length) * 100}%`;
            
            document.getElementById('feedback-hint').classList.add('hidden');
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = "mt-10 w-full py-4 bg-slate-200 text-slate-400 font-bold rounded-xl cursor-not-allowed transition-all";
            nextBtn.innerText = "請選取答案";

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            q.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "opt-btn w-full text-left p-4 rounded-xl font-medium text-slate-700 animate-fade flex items-center bg-white hover:bg-slate-50";
                b.innerHTML = `<span class="flex-shrink-0 inline-block w-6 h-6 border-2 border-slate-300 rounded-full mr-3 text-center text-[10px] leading-5 font-bold text-slate-500">${String.fromCharCode(65+i)}</span> <span>${opt}</span>`;
                b.onclick = () => handleSelection(i, b);
                box.appendChild(b);
            });
        }

        function handleSelection(selectedIdx, element) {
            if (!state.isAnswering) return;
            state.isAnswering = false; // 鎖定點擊

            const q = quizData[state.index];
            const isCorrect = selectedIdx === q.c;
            const techSelectionText = q.a[selectedIdx];
            const correctText = q.a[q.c];

            // 紀錄詳細字串放入陣列
            const recordStr = `Q${state.index + 1}:[${isCorrect ? "對" : "錯"}] 技師選:${techSelectionText} / 正確解:${correctText}`;
            state.userRecords.push(recordStr);

            if (isCorrect) state.score += 5;

            // 即時 UI 回饋：改變選項顏色
            const buttons = document.querySelectorAll('.opt-btn');
            buttons.forEach((btn, i) => {
                const iconSpan = btn.querySelector('span');
                if (i === q.c) {
                    // 正確答案變綠色
                    btn.classList.add('opt-correct');
                    iconSpan.innerHTML = "✓";
                    iconSpan.className = "flex-shrink-0 inline-block w-6 h-6 border-2 border-green-500 bg-green-500 rounded-full mr-3 text-center text-[10px] leading-5 font-bold text-white";
                    if (!isCorrect) btn.classList.add('opt-highlight'); // 若技師答錯，高亮正確答案
                } else if (i === selectedIdx && !isCorrect) {
                    // 技師選錯的答案變紅色
                    btn.classList.add('opt-wrong');
                    iconSpan.innerHTML = "✗";
                    iconSpan.className = "flex-shrink-0 inline-block w-6 h-6 border-2 border-red-500 bg-red-500 rounded-full mr-3 text-center text-[10px] leading-5 font-bold text-white";
                } else {
                    btn.style.opacity = "0.4"; // 其他淡化
                }
            });

            // 顯示底部提示訊息
            const hintBox = document.getElementById('hint-box');
            const hintContainer = document.getElementById('feedback-hint');
            hintContainer.classList.remove('hidden');
            
            if (isCorrect) {
                hintBox.className = "p-4 rounded-xl text-sm font-bold bg-green-50 text-green-700 border border-green-200 w-full";
                hintBox.innerHTML = `<span class="text-lg">✅</span> 答對了！繼續保持`;
            } else {
                hintBox.className = "p-4 rounded-xl text-sm font-bold bg-red-50 text-red-700 border border-red-200 w-full";
                hintBox.innerHTML = `<span class="text-lg">❌</span> 正確答案應為：<br><span class="text-slate-800 font-extrabold mt-1 block">${correctText}</span>`;
            }

            // 開放下一題按鈕
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.className = "mt-10 w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-all hover:bg-blue-700";
            nextBtn.innerText = (state.index === quizData.length - 1) ? "提交並查看成績" : "進入下一題";
        }

        function goToNext() {
            if (state.index < quizData.length - 1) {
                state.index++;
                renderQuestion();
            } else {
                finalize();
            }
        }

        function finalize() {
            // 停止計時器與解除防作弊攔截
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            window.onbeforeunload = null; 

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            // 將紀錄陣列轉換為以 | 分隔的字串
            const finalDetailStr = state.userRecords.join(" | ");

            const postUrl = `https://docs.google.com/forms/d/e/${CONFIG.formID}/formResponse`;
            const params = new URLSearchParams();
            params.append(CONFIG.dealerEntry, state.userDealer);
            params.append(CONFIG.nameEntry, state.userName);
            params.append(CONFIG.scoreEntry, state.score);
            params.append(CONFIG.detailEntry, finalDetailStr); 

            // 發送最終真實成績覆蓋初始的 0 分紀錄
            fetch(postUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }).then(() => {
                setTimeout(() => {
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('score-display').classList.remove('hidden');
                    
                    document.getElementById('final-score').innerText = state.score;
                    document.getElementById('summary-dealer').innerText = state.userDealer;
                    document.getElementById('summary-name').innerText = state.userName;
                    document.getElementById('summary-score').innerText = state.score + " 分";
                    
                    if (state.score >= 60) triggerConfetti();
                }, 1500);
            }).catch(err => {
                console.error("提交錯誤", err);
                alert("成績上傳可能有誤，請截圖本畫面回報主管。您的分數：" + state.score);
            });
        }

        function triggerConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = Array.from({ length: 100 }).map(() => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                w: Math.random() * 8 + 4,
                h: Math.random() * 8 + 4,
                color: `hsl(${Math.random() * 360}, 80%, 50%)`,
                speed: Math.random() * 3 + 3,
                r: Math.random() * 360
            }));
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.y += p.speed; 
                    p.r += 2;
                    ctx.save();
                    ctx.translate(p.x, p.y); 
                    ctx.rotate(p.r * Math.PI / 180);
                    ctx.fillStyle = p.color; 
                    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                    ctx.restore();
                });
                if (particles[0].y < canvas.height * 2) requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
