<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGBOX 專業技術測驗 - 第 3 & 4 章節</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .option-transition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-bar { transition: width 0.4s ease-in-out; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl">
        <!-- 歡迎畫面 -->
        <div id="welcome-screen" class="glass-morphism rounded-3xl shadow-2xl p-8 text-center animate-fade-in">
            <div class="mb-6 inline-flex p-4 rounded-full bg-blue-50 text-blue-600">
                <div class="w-12 h-12 flex items-center justify-center font-bold text-2xl border-4 border-blue-600 rounded-lg">DBX</div>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">DIAGBOX 技術測驗</h1>
            <p class="text-slate-500 mb-8 leading-relaxed">
                本測驗涵蓋操作手冊第 3 章 (功能選單) 與第 4 章 (維修實踐)。<br>
                共 20 題，滿分 100 分。請在掃描後開始作答。
            </p>
            <button onclick="startQuiz()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                開始線上測驗
            </button>
            <p class="mt-4 text-xs text-slate-400">Stellantis Group Diagnostic Training Support</p>
        </div>

        <!-- 測驗內容 -->
        <div id="quiz-screen" class="hidden glass-morphism rounded-3xl shadow-2xl overflow-hidden animate-fade-in">
            <!-- 進度條 -->
            <div class="h-2 w-full bg-slate-100">
                <div id="progress-indicator" class="progress-bar h-full bg-blue-500 w-0"></div>
            </div>
            
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <span id="question-number" class="px-3 py-1 bg-blue-100 text-blue-700 text-sm font-bold rounded-full">第 1 / 20 題</span>
                    <span id="score-tracking" class="text-slate-400 text-sm font-medium">目前得分: 0</span>
                </div>
                
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-snug">載入中...</h2>
                
                <div id="options-container" class="space-y-3">
                    <!-- 選項將由 JS 動態生成 -->
                </div>

                <button id="next-btn" onclick="nextQuestion()" disabled class="mt-10 w-full py-4 bg-slate-200 text-slate-400 font-bold rounded-2xl cursor-not-allowed transition-all">
                    請選擇一個答案
                </button>
            </div>
        </div>

        <!-- 結果畫面 -->
        <div id="result-screen" class="hidden glass-morphism rounded-3xl shadow-2xl p-10 text-center animate-fade-in">
            <h2 class="text-2xl font-bold text-slate-900 mb-2">測驗結算</h2>
            <div class="py-8">
                <div class="text-7xl font-black text-blue-600 mb-2" id="final-score">0</div>
                <p class="text-slate-500 font-medium">分 / 總分 100</p>
            </div>
            
            <div id="feedback-box" class="p-6 rounded-2xl mb-8">
                <h3 id="feedback-title" class="font-bold text-lg mb-2">評語載入中</h3>
                <p id="feedback-desc" class="text-sm opacity-80"></p>
            </div>

            <button onclick="location.reload()" class="w-full py-4 bg-slate-900 hover:bg-black text-white font-bold rounded-2xl transition-all active:scale-95">
                重新挑戰
            </button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Stellantis 提供哪種方案包含加固電腦及 PSA XS E 接頭且有四年保固？", a: ["DIAGBOX One", "DIAGBOX Liberty", "DIAGBOX Premium", "DIAGBOX Token"], c: 2 },
            { q: "獨立維修廠 (Independent repairers) 的授權運作方式為何？", a: ["永久免費授權", "每月固定月費制", "購買代幣，每品牌有效期限為一週", "購買代幣，每品牌有效期限為一年"], c: 2 },
            { q: "哪個品牌特別標註僅適用於「2018 年以後上市」的車型？", a: ["Citroën", "Peugeot", "DS Automobiles", "Opel / Vauxhall"], c: 3 },
            { q: "在入口網站若要隱藏不常出現的車型以節省搜尋時間，應點擊？", a: ["Configuration du portail", "Menu Diagnostic", "Gestion Flash", "Aide"], c: 0 },
            { q: "若要顯示所有「被隱藏」的車型，應點擊入口網站的哪個按鈕？", a: ["Refresh", "Help", "...", "Home"], c: 2 },
            { q: "執行新車準備 (PVN) 或加裝附件 (如倒車顯影)，應選擇哪個選單？", a: ["Repair", "Fault finding", "Customer delivery", "Servicing"], c: 2 },
            { q: "在「Repair」選單中，若 ECU 未被自動識別，畫面上會顯示？", a: ["calculateur inconnu", "Connection Error", "Code 404", "System Busy"], c: 0 },
            { q: "關於「手動配置 (Telecoding Manual)」，下列敘述何者正確？", a: ["可直接進入", "僅限離線使用", "自動配置執行過後才能存取", "僅適用於舊款車型"], c: 2 },
            { q: "在 Download 選單中若顯示「ECU updated」，代表什麼？", a: ["ECU 損壞", "電池電壓不足", "ECU 版本比伺服器上的更新", "網路中斷"], c: 2 },
            { q: "更換零件 (如 ECU) 時，應優先使用哪一個子選單？", a: ["Identification", "Fault Reading", "Repair pack (replacement, programming...)", "Actuator Test"], c: 2 },
            { q: "Fault finding 開始前，驗證圖示 (Authentication icon) 應為何種顏色？", a: ["紅色", "黃色", "藍色", "綠色"], c: 3 },
            { q: "下列哪項操作屬於「Servicing (保養)」選單的操作範疇？", a: ["加裝警報器", "添加柴油添加劑 (DPF)", "更改輪胎規格", "新車交車檢查"], c: 1 },
            { q: "2015 年以後新發佈的 TSB (技術通報) 應在哪裡搜尋？", a: ["DIAGBOX 內建標籤", "實體紙本手冊", "Service Box 網頁", "手機簡訊通報"], c: 2 },
            { q: "關於 TSB 的使用規範，下列敘述何者「錯誤」？", a: ["查閱 TSB 是強制性步驟", "禁止列印 TSB 文件", "可將 TSB 用於不同車身號碼之車輛", "禁止外流資訊"], c: 2 },
            { q: "在建立 DID-A (技術支援請求) 之前，技師「必須」先執行？", a: ["重灌 DIAGBOX", "查閱 ISolve 確認有無方案", "更換 VCI 接頭", "直接致電技術部"], c: 1 },
            { q: "準備 DID-A 時，關於診斷畫面截圖的正確做法是？", a: ["用手機拍照", "用數位相機拍照", "使用 DIAGBOX 內建截圖功能", "不需提供畫面"], c: 2 },
            { q: "針對「同一個」未解決的問題，應如何發送 DID-A 以獲得優先處理？", a: ["建立大量新檔案", "開啟「補充 (Supplement)」案件", "改寄電子郵件", "透過傳真申請"], c: 1 },
            { q: "若遇到「診斷工具啟用/註冊 (Activation)」問題，求助管道為何？", a: ["DIAGBOX 內的 Report 標籤", "透過 Service Box 請求協助", "ISolve 系統", "重新開機即可"], c: 1 },
            { q: "為維持工具最佳效能，技師在「每天結束工作時」應？", a: ["保持待機", "關閉電腦電源", "持續充電", "保持螢幕常亮"], c: 1 },
            { q: "診斷電腦對於「第三方軟體」的安裝規範為何？", a: ["可以自由安裝", "僅能安裝 Stellantis 核准的軟體", "只要不影響效能即可安裝", "無任何限制"], c: 1 }
        ];

        let currentIdx = 0;
        let score = 0;
        let selectedIdx = null;

        function startQuiz() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = questions[currentIdx];
            document.getElementById('question-number').innerText = `第 ${currentIdx + 1} / ${questions.length} 題`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('score-tracking').innerText = `目前得分: ${score}`;
            
            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress-indicator').style.width = `${progress}%`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-200 hover:bg-blue-50 font-medium option-transition flex items-center justify-between group";
                btn.innerHTML = `
                    <span>${option}</span>
                    <div class="w-6 h-6 rounded-full border-2 border-slate-200 group-hover:border-blue-400 flex items-center justify-center text-transparent text-xs font-bold">✓</div>
                `;
                btn.onclick = () => selectOption(index, btn);
                container.appendChild(btn);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = "mt-10 w-full py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl cursor-not-allowed";
            nextBtn.innerText = "請選擇一個答案";
        }

        function selectOption(idx, element) {
            selectedIdx = idx;
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.classList.remove('border-blue-500', 'bg-blue-50');
                b.classList.add('border-slate-100');
                b.querySelector('div').classList.replace('bg-blue-500', 'text-transparent');
            });
            
            element.classList.remove('border-slate-100');
            element.classList.add('border-blue-500', 'bg-blue-50');
            const check = element.querySelector('div');
            check.classList.replace('text-transparent', 'bg-blue-500');
            check.classList.add('text-white', 'border-blue-500');

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.className = "mt-10 w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-100 transition-all active:scale-95 cursor-pointer";
            nextBtn.innerText = (currentIdx === questions.length - 1) ? "提交並查看結果" : "進入下一題";
        }

        function nextQuestion() {
            if (selectedIdx === questions[currentIdx].c) {
                score += 5;
            }

            currentIdx++;
            if (currentIdx < questions.length) {
                selectedIdx = null;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;

            const title = document.getElementById('feedback-title');
            const desc = document.getElementById('feedback-desc');
            const box = document.getElementById('feedback-box');

            if (score >= 90) {
                title.innerText = "卓越：大師級專家";
                desc.innerText = "您對 DIAGBOX 的操作與 Stellantis 最佳實踐瞭如指掌，完全具備高級診斷技師的標準。";
                box.classList.add('bg-green-50', 'text-green-700');
            } else if (score >= 70) {
                title.innerText = "良好：專業技師";
                desc.innerText = "您已經掌握了大部分的核心流程，只需針對部分細節（如 DID-A 提報流程）稍加複習。";
                box.classList.add('bg-blue-50', 'text-blue-700');
            } else {
                title.innerText = "需加強：培訓學員";
                desc.innerText = "建議重新仔細閱讀手冊第 3 章與第 4 章，特別是關於 TSB 查閱與工具維護的規範。";
                box.classList.add('bg-orange-50', 'text-orange-700');
            }
        }
    </script>
</body>
</html>
