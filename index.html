<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGBOX 專業技術評核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .option-active { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-lg">
        
        <!-- 登入介面 -->
        <div id="login-screen" class="glass-panel rounded-3xl shadow-xl p-8 text-center border border-white">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg transform -rotate-3">
                <span class="text-white font-bold text-2xl">DBX</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">技術部專業測驗</h1>
            <p class="text-slate-500 mb-8 text-sm">請輸入正確姓名，測驗結果將同步至雲端系統</p>
            
            <input type="text" id="user-name" placeholder="請輸入姓名" 
                   class="w-full p-4 mb-6 rounded-xl border-2 border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-center text-lg font-medium">
            
            <button onclick="startQuiz()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95">
                開始進入評核
            </button>
        </div>

        <!-- 測驗內容區 -->
        <div id="quiz-screen" class="hidden glass-panel rounded-3xl shadow-xl overflow-hidden border border-white">
            <div class="h-2 w-full bg-slate-100">
                <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500 w-0"></div>
            </div>
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <span id="question-number" class="text-xs font-bold uppercase tracking-wider text-blue-600 bg-blue-50 px-3 py-1 rounded-full">載入中...</span>
                    <span id="user-display" class="text-xs text-slate-400 font-medium"></span>
                </div>
                <h2 id="question-text" class="text-lg font-bold text-slate-800 mb-8 leading-relaxed">題庫準備中...</h2>
                <div id="options-container" class="space-y-3"></div>
                
                <button id="next-btn" onclick="handleNext()" disabled 
                        class="mt-10 w-full py-4 bg-slate-200 text-slate-400 font-bold rounded-xl cursor-not-allowed transition-all">
                    請先選取答案
                </button>
            </div>
        </div>

        <!-- 提交與結果 -->
        <div id="result-screen" class="hidden glass-panel rounded-3xl shadow-xl p-10 text-center border border-white">
            <div id="syncing-ui" class="py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto"></div>
                <p class="mt-4 text-slate-500 font-medium tracking-wide">數據同步中，請稍候...</p>
            </div>
            
            <div id="score-ui" class="hidden">
                <h2 class="text-xl font-bold text-slate-800 mb-2">測驗完成</h2>
                <p class="text-slate-400 text-sm mb-6">您的評核表現</p>
                <div class="text-7xl font-black text-blue-600 italic mb-8" id="final-score">0</div>
                <div class="bg-blue-50 rounded-2xl p-5 mb-8 text-blue-800 text-sm border border-blue-100">
                    成績已成功紀錄至 Google 試算表。<br>您可以關閉瀏覽器或重新開始。
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-900 transition-colors">
                    重新測驗
                </button>
            </div>
        </div>
    </div>

    <script>
        // 配置資訊：由您提供的預先填寫連結提取
        const CONFIG = {
            formID: "1FAIpQLSftyWqZ8Q8tkYGA6bQeSnP2nxZldQoPt2gH7mSXczpfnNloaA",
            nameEntry: "entry.1735160920",
            scoreEntry: "entry.609819735"
        };

        const questions = [
            { q: "Stellantis 提供哪種方案包含加固電腦、PSA XS E 診斷接頭且有四年保固？", a: ["DIAGBOX One", "DIAGBOX Liberty", "DIAGBOX Premium", "DIAGBOX Token"], c: 2 },
            { q: "獨立維修廠 (Independent repairers) 的授權運作方式為何？", a: ["永久免費授權", "每月固定月費制", "購買代幣，每品牌有效期限為一週", "購買代幣，每品牌有效期限為一年"], c: 2 },
            { q: "哪個品牌特別標註僅適用於「2018 年以後上市」的車型？", a: ["Citroën", "Peugeot", "DS Automobiles", "Opel / Vauxhall"], c: 3 },
            { q: "在入口網站若要隱藏不常出現的車型以節省搜尋時間，應點擊？", a: ["Configuration du portail", "Menu Diagnostic", "Gestion Flash", "Aide"], c: 0 },
            { q: "若要顯示所有「被隱藏」的車型，應點擊入口網站的哪個按鈕？", a: ["Refresh", "Help", "...", "Home"], c: 2 },
            { q: "執行新車準備 (PVN) 或加裝附件 (如倒車顯影)，應選擇哪個選單？", a: ["Repair", "Fault finding", "Customer delivery", "Servicing"], c: 2 },
            { q: "在「Repair」選單中，若 ECU 未被自動識別，畫面上會顯示？", a: ["calculateur inconnu", "Connection Error", "Code 404", "System Busy"], c: 0 },
            { q: "關於「手動配置」，下列敘述何者正確？", a: ["可直接進入", "僅限離線使用", "自動配置執行過後才能存取", "僅適用於舊款車型"], c: 2 },
            { q: "在 Download 選單中若顯示「ECU updated」，代表什麼？", a: ["ECU 損壞", "電池電壓不足", "ECU 版本比伺服器上的更新", "網路中斷"], c: 2 },
            { q: "更換零件 (如 ECU) 時，應優先使用哪一個子選單？", a: ["Identification", "Fault Reading", "Repair pack", "Actuator Test"], c: 2 },
            { q: "Fault finding 開始前，驗證圖示 (Authentication icon) 應為何種顏色？", a: ["紅色", "黃色", "藍色", "綠色"], c: 3 },
            { q: "下列哪項操作屬於「Servicing (保養)」選單的操作範疇？", a: ["加裝警報器", "添加柴油添加劑 (DPF)", "更改輪胎規格", "新車交車檢查"], c: 1 },
            { q: "2015 年以後新發佈的 TSB (技術通報) 應在哪裡搜尋？", a: ["DIAGBOX 內建標籤", "實體紙本手冊", "Service Box 網頁", "手機簡訊通報"], c: 2 },
            { q: "關於 TSB 的使用規範，下列敘述何者「錯誤」？", a: ["查閱 TSB 是強制性步驟", "禁止列印 TSB 文件", "可將 TSB 用於不同車身號碼之車輛", "禁止外流資訊"], c: 2 },
            { q: "建立 DID-A 之前，技師「必須」先執行？", a: ["重灌 DIAGBOX", "查閱 ISolve 確認有無方案", "更換 VCI 接頭", "直接致電技術部"], c: 1 },
            { q: "準備 DID-A 時，關於診斷畫面截圖的正確做法是？", a: ["用手機拍照", "用數位相機拍照", "使用 DIAGBOX 內建截圖功能", "不需提供畫面"], c: 2 },
            { q: "針對「同一個」未解決的問題，應如何發送 DID-A 以獲得優先處理？", a: ["建立大量新檔案", "開啟「補充 (Supplement)」案件", "改寄電子郵件", "透過傳真申請"], c: 1 },
            { q: "若遇到「診斷工具啟用/註冊」問題，求助管道為何？", a: ["DIAGBOX 內的 Report 標籤", "透過 Service Box 請求協助", "ISolve 系統", "重新開機即可"], c: 1 },
            { q: "為維持工具最佳效能，技師在「每天結束工作時」應？", a: ["保持待機", "關閉電腦電源", "持續充電", "保持螢幕常亮"], c: 1 },
            { q: "診斷電腦對於「第三方軟體」的安裝規範為何？", a: ["可以自由安裝", "僅能安裝 Stellantis 核准的軟體", "只要不影響效能即可安裝", "無任何限制"], c: 1 }
        ];

        let state = { currentIdx: 0, score: 0, userName: "", selected: null };

        function startQuiz() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) { alert("請輸入姓名以紀錄成績"); return; }
            state.userName = name;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('user-display').innerText = `考生: ${name}`;
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[state.currentIdx];
            document.getElementById('question-number').innerText = `Question ${state.currentIdx + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-bar').style.width = `${((state.currentIdx) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:bg-slate-50 font-medium transition-all text-slate-700";
                btn.innerText = opt;
                btn.onclick = () => {
                    state.selected = i;
                    document.querySelectorAll('#options-container button').forEach(b => b.classList.remove('option-active'));
                    btn.classList.add('option-active');
                    const nextBtn = document.getElementById('next-btn');
                    nextBtn.disabled = false;
                    nextBtn.className = "mt-10 w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95";
                    nextBtn.innerText = state.currentIdx === questions.length - 1 ? "完成並提交成績" : "下一題";
                };
                container.appendChild(btn);
            });
        }

        function handleNext() {
            if (state.selected === questions[state.currentIdx].c) state.score += 5;
            
            if (state.currentIdx < questions.length - 1) {
                state.currentIdx++;
                state.selected = null;
                const nextBtn = document.getElementById('next-btn');
                nextBtn.disabled = true;
                nextBtn.className = "mt-10 w-full py-4 bg-slate-200 text-slate-400 font-bold rounded-xl cursor-not-allowed";
                renderQuestion();
            } else {
                submitData();
            }
        }

        function submitData() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const postUrl = `https://docs.google.com/forms/d/e/${CONFIG.formID}/formResponse`;
            
            // 關鍵：使用 URLSearchParams 並強制設定為 x-www-form-urlencoded
            const params = new URLSearchParams();
            params.append(CONFIG.nameEntry, state.userName);
            params.append(CONFIG.scoreEntry, state.score);

            fetch(postUrl, {
                method: 'POST',
                mode: 'no-cors', // 必須使用 no-cors
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }).then(() => {
                setTimeout(() => {
                    document.getElementById('syncing-ui').classList.add('hidden');
                    document.getElementById('score-ui').classList.remove('hidden');
                    document.getElementById('final-score').innerText = state.score;
                }, 1500);
            }).catch(err => {
                console.error("提交失敗", err);
                alert("網路不穩定，請確保網路連線正常。");
            });
        }
    </script>
</body>
</html>
